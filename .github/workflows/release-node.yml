name: Release Node SDK

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./sdks/node
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install

      - name: Build Package
        run: npm run build

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack Tarball
        run: npm pack

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sdks/node/dcoink-*.tgz
          name: Node SDK ${{ github.ref_name }}
          body: "Automated release for the dcoink Node.js SDK. Install via NPM or download the tarball directly."
          draft: false
          prerelease: false
